AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Python Lambda with Cognito-protected HTTP API

Parameters:
  FireWhisperUserPool:
    Type: String
    Description: The Cognito User Pool ID (e.g., us-east-1_ABC123)

  FireWhisperUserPoolClient:
    Type: String
    Description: The Cognito User Pool App Client ID

  Environment:
    Type: String
    Default: Dev
    AllowedValues:
      - Dev
      - Beta
    Description: Environment name for resource naming

Resources:
  FireWhisperHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Name: !Sub "FireWhisper-API-${Environment}"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            AuthorizationType: JWT
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${FireWhisperUserPool}"
              audience:
                - !Ref FireWhisperUserPoolClient
            IdentitySource: "$request.header.Authorization"
      CorsConfiguration:
        AllowMethods:
          - POST
          - GET
          - OPTIONS
          - DELETE
        AllowHeaders:
          - Authorization
          - Content-Type
        AllowOrigins:
          - http://localhost:5173
          - https://d2chhelaxtwh4k.cloudfront.net
          - https://rpgtestdomain.com
          - https://dev.firewhisper.io

  AllowTakeTurnToInvokeUpdateCharacter:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt UpdateCharacterFunction.Arn
      Action: lambda:InvokeFunction
      Principal: lambda.amazonaws.com
      SourceArn: !GetAtt TakeTurnFunction.Arn

  GetGameFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/
      Handler: get_game.handler
      Runtime: python3.11
      Timeout: 30
      Events:
        TitanApi:
          Type: HttpApi
          Properties:
            Path: /api/getgame
            Method: GET
            ApiId: !Ref FireWhisperHttpApi
            Auth:
              Authorizer: CognitoAuthorizer
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource:
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/FW_Sagas_${Environment}"
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/FW_UserData_${Environment}"

  GetUserDataFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/
      Handler: get_user_data.handler
      Runtime: python3.11
      Timeout: 10
      Events:
        TitanApi:
          Type: HttpApi
          Properties:
            Path: /api/getuserdata
            Method: GET
            ApiId: !Ref FireWhisperHttpApi
            Auth:
              Authorizer: CognitoAuthorizer
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource:
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/FW_UserData_${Environment}"

  TakeTurnFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/
      Handler: take_turn.handler
      Runtime: python3.11
      Timeout: 30
      Environment:
        Variables:
          UPDATE_CHARACTER_ARN: !GetAtt UpdateCharacterFunction.Arn
      Events:
        TitanApi:
          Type: HttpApi
          Properties:
            Path: /api/taketurn
            Method: POST
            ApiId: !Ref FireWhisperHttpApi
            Auth:
              Authorizer: CognitoAuthorizer
      Policies:
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource:
                - arn:aws:bedrock:us-east-1::foundation-model/*
                - arn:aws:bedrock:us-east-1::foundation-model/anthropic.claude-3-haiku-20240307-v1:0
                - arn:aws:bedrock:us-east-1:485875644646:inference-profile/us.anthropic.claude-3-5-haiku-20241022-v1:0
                - arn:aws:bedrock:us-east-2:485875644646:inference-profile/us.anthropic.claude-3-5-haiku-20241022-v1:0
                - arn:aws:bedrock:us-east-1::foundation-model/anthropic.claude-3-5-haiku-20241022-v1:0
                - arn:aws:bedrock:us-east-2::foundation-model/anthropic.claude-3-5-haiku-20241022-v1:0
                - arn:aws:bedrock:us-west-2::foundation-model/anthropic.claude-3-5-haiku-20241022-v1:0
                - arn:aws:bedrock:us-east-1:485875644646:inference-profile/us.anthropic.claude-sonnet-4-20250514-v1:0
                - arn:aws:bedrock:us-east-2:485875644646:inference-profile/us.anthropic.claude-sonnet-4-20250514-v1:0
                - arn:aws:bedrock:us-west-2:485875644646:inference-profile/us.anthropic.claude-sonnet-4-20250514-v1:0
                - arn:aws:bedrock:us-east-1::foundation-model/anthropic.claude-sonnet-4-20250514-v1:0
                - arn:aws:bedrock:us-east-2::foundation-model/anthropic.claude-sonnet-4-20250514-v1:0
                - arn:aws:bedrock:us-west-2::foundation-model/anthropic.claude-sonnet-4-20250514-v1:0
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
              Resource:
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/FW_Sagas_${Environment}"
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/FW_UserData_${Environment}"
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/FW_Characters_${Environment}"
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !GetAtt UpdateCharacterFunction.Arn

  CreateCharacterFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/
      Handler: create_character.handler
      Runtime: python3.11
      Timeout: 30
      Events:
        TitanApi:
          Type: HttpApi
          Properties:
            Path: /api/createcharacter
            Method: POST
            ApiId: !Ref FireWhisperHttpApi
            Auth:
              Authorizer: CognitoAuthorizer
      Policies:
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource:
                - arn:aws:bedrock:us-east-1::foundation-model/*
                - arn:aws:bedrock:us-east-1::foundation-model/anthropic.claude-3-haiku-20240307-v1:0
                - arn:aws:bedrock:us-east-1:485875644646:inference-profile/us.anthropic.claude-3-5-haiku-20241022-v1:0
                - arn:aws:bedrock:us-east-2:485875644646:inference-profile/us.anthropic.claude-3-5-haiku-20241022-v1:0
                - arn:aws:bedrock:us-east-1::foundation-model/anthropic.claude-3-5-haiku-20241022-v1:0
                - arn:aws:bedrock:us-east-2::foundation-model/anthropic.claude-3-5-haiku-20241022-v1:0
                - arn:aws:bedrock:us-west-2::foundation-model/anthropic.claude-3-5-haiku-20241022-v1:0
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
              Resource:
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/FW_Characters_${Environment}"
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/FW_UserData_${Environment}"

  DeleteCharacterFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/
      Handler: delete_character.handler
      Runtime: python3.11
      Timeout: 30
      Events:
        TitanApi:
          Type: HttpApi
          Properties:
            Path: /api/deletecharacter
            Method: DELETE
            ApiId: !Ref FireWhisperHttpApi
            Auth:
              Authorizer: CognitoAuthorizer
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
              Resource:
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/FW_UserData_${Environment}"

  UpdateCharacterFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/
      Handler: update_character_from_game.handler
      Runtime: python3.11
      Timeout: 60
      Events:
        TitanApi:
          Type: HttpApi
          Properties:
            Path: /api/updatecharacter
            Method: POST
            ApiId: !Ref FireWhisperHttpApi
            Auth:
              Authorizer: CognitoAuthorizer
      Policies:
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource:
                - arn:aws:bedrock:us-east-1::foundation-model/*
                - arn:aws:bedrock:us-east-1::foundation-model/anthropic.claude-3-haiku-20240307-v1:0
                - arn:aws:bedrock:us-east-1:485875644646:inference-profile/us.anthropic.claude-3-5-haiku-20241022-v1:0
                - arn:aws:bedrock:us-east-2:485875644646:inference-profile/us.anthropic.claude-3-5-haiku-20241022-v1:0
                - arn:aws:bedrock:us-east-1::foundation-model/anthropic.claude-3-5-haiku-20241022-v1:0
                - arn:aws:bedrock:us-east-2::foundation-model/anthropic.claude-3-5-haiku-20241022-v1:0
                - arn:aws:bedrock:us-west-2::foundation-model/anthropic.claude-3-5-haiku-20241022-v1:0
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
              Resource:
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/FW_Sagas_${Environment}"
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/FW_Characters_${Environment}"
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/FW_UserData_${Environment}"

  GetCharacterFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/
      Handler: get_character.handler
      Runtime: python3.11
      Timeout: 10
      Events:
        TitanApi:
          Type: HttpApi
          Properties:
            Path: /api/getcharacter
            Method: GET
            ApiId: !Ref FireWhisperHttpApi
            Auth:
              Authorizer: CognitoAuthorizer
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource:
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/FW_Sagas_${Environment}"
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/FW_Characters_${Environment}"
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/FW_UserData_${Environment}"

  StartSagaFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/
      Handler: create_saga.handler
      Runtime: python3.11
      Timeout: 30
      Events:
        TitanApi:
          Type: HttpApi
          Properties:
            Path: /api/createsaga
            Method: POST
            ApiId: !Ref FireWhisperHttpApi
            Auth:
              Authorizer: CognitoAuthorizer
      Policies:
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource:
                - arn:aws:bedrock:us-east-1::foundation-model/*
                - arn:aws:bedrock:us-east-1::foundation-model/anthropic.claude-3-haiku-20240307-v1:0
                - arn:aws:bedrock:us-east-1:485875644646:inference-profile/us.anthropic.claude-3-5-haiku-20241022-v1:0
                - arn:aws:bedrock:us-east-2:485875644646:inference-profile/us.anthropic.claude-3-5-haiku-20241022-v1:0
                - arn:aws:bedrock:us-east-1::foundation-model/anthropic.claude-3-5-haiku-20241022-v1:0
                - arn:aws:bedrock:us-east-2::foundation-model/anthropic.claude-3-5-haiku-20241022-v1:0
                - arn:aws:bedrock:us-west-2::foundation-model/anthropic.claude-3-5-haiku-20241022-v1:0
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
              Resource:
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/FW_Sagas_${Environment}"
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/FW_Characters_${Environment}"
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/FW_UserData_${Environment}"

Outputs:
  HttpApiUrl:
    Description: "HTTP API URL"
    Value: !Sub "https://${FireWhisperHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
