      game_name: The Crimson Prophecy
      opening_scene: "*Your boots crunch on freshly fallen leaves as you crest the hill overlooking Millhaven. The farming\
        \ village spreads below in the golden afternoon light\u2014neat cottages with smoke curling from chimneys, children\
        \ playing between the grain storehouses, and villagers tending their final harvest before winter sets in.*\n\n*You've\
        \ come to this peaceful place seeking work, your armor and greatsword a reassuring weight on your back. As a newly\
        \ initiated Paladin of the Order of the Silver Hand, you hope to find opportunities to prove your worth and serve\
        \ the common folk.*\n\n*Emberlyn, a wise fairy with glittering wings, flutters beside you. \"Charming little village,\"\
        \ she observes. \"I sense an aura of tranquility, but also a subtle undercurrent of unease. Something stirs in the\
        \ shadows. Shall we investigate?\"*\n\n*Below, you notice a weathered stone monument in the village center, children\
        \ gathered around an elderly storyteller, and smoke rising from what appears to be a blacksmith's forge.*\n\nWhat\
        \ do you do?\n[Approach the village center monument]\n[Listen to the storyteller and children] \n[Visit the blacksmith's\
        \ forge first]\n[Ask Emberlyn what she senses about this place]\n[Describe your own action]"
