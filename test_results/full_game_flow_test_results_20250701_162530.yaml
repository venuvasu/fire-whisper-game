      game_name: The Crimson Prophecy
      opening_scene: '*Your travel-worn boots crunch on autumn leaves as you crest the hill overlooking the farming village
        of Millhaven. The golden afternoon light bathes the tidy cottages, children playing between the grain storehouses,
        and villagers tending their final harvest before winter.*


        *You''ve come seeking work, and this peaceful place seems the perfect opportunity. As you take in the scene, a flutter
        of wings draws your attention - Emberlyn, a wise fairy, hovers beside you.*


        "Charming little village," Emberlyn observes. "It seems a fine place to lend your skills, Aria Moonwhisper. Shall
        we see what awaits, or would you prefer to observe a while longer?"


        Below, you notice a weathered stone monument in the village center, an elderly storyteller captivating a group of
        children, and smoke rising from what appears to be a blacksmith''s forge.


        What do you do?'
