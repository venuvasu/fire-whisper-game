      opening_scene: 'Theron Brightblade, newly inducted into the Order of the Radiant Swords, crests the hill overlooking
        the peaceful village of Millhaven. The afternoon sun bathes the quaint cottages and bustling activity in a warm glow,
        a stark contrast to the darkness that now stirs in the nearby forest.


        Emberlyn, a wise fairy with gossamer wings, flutters beside you. "What a lovely little hamlet," she muses. "Though
        I sense a growing unease in the trees beyond. Shall we investigate?"


        Below, you notice the villagers going about their daily routines - children playing, elders telling stories, and smoke
        rising from the blacksmith''s forge. But an undercurrent of tension hangs in the air, as if the entire community is
        holding its breath.


        S - The villagers seem unsettled, with an unease permeating the air. Your paladin senses detect a growing evil presence
        in the nearby forest.

        P - Discover the source of the darkness threatening Millhaven and protect the innocent townsfolk.

        A - Gather information from the villagers, inspect the forest edge, and prepare to confront the emerging threat.

        R - Theron Brightblade, a principled paladin sworn to the Order of the Radiant Swords, has arrived in Millhaven at
        a crucial time.

        K - This is a Hero-level adventure, so the challenges will require tactical thinking and there is a real risk of death.


        What do you do?'
